name: HeadacheLogger
options:
  bundleIdPrefix: com.jackwallner
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: YXG4MP6W39
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "31"
    GENERATE_INFOPLIST_FILE: NO

schemes:
  HeadacheLogger:
    build:
      targets:
        HeadacheLogger: all
        HeadacheLoggerWidget: all
        HeadacheLoggerWatch: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - HeadacheLoggerTests
  HeadacheLoggerWatch:
    build:
      targets:
        HeadacheLoggerWatch: all
    run:
      config: Debug

targets:
  HeadacheLogger:
    type: application
    platform: iOS
    sources:
      - path: HeadacheLogger
        excludes:
          - PrivacyInfo.xcprivacy
      - path: SharedHeadache
      - path: HeadacheLogger/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: OneTapHeadacheTracker
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.headachelogger
        INFOPLIST_FILE: HeadacheLogger/Info.plist
        CODE_SIGN_ENTITLEMENTS: HeadacheLogger/HeadacheLogger.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: HeadacheLoggerWidget
      - target: HeadacheLoggerWatch
        embed: true

  HeadacheLoggerWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: HeadacheLoggerWidget
        excludes:
          - PrivacyInfo.xcprivacy
      - path: HeadacheLoggerWidget/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: SharedHeadache
      - path: HeadacheLogger/Models/HeadacheEvent.swift
      - path: HeadacheLogger/Services/HeadacheModelStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.headachelogger.widget
        INFOPLIST_FILE: HeadacheLoggerWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: HeadacheLoggerWidget/HeadacheLoggerWidget.entitlements

  HeadacheLoggerWatch:
    type: application
    platform: watchOS
    sources:
      - path: HeadacheLoggerWatch
      - path: SharedHeadache
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.headachelogger.watch
        INFOPLIST_FILE: HeadacheLoggerWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: HeadacheLoggerWatch/HeadacheLoggerWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  HeadacheLoggerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HeadacheLoggerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.headachelogger.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: HeadacheLogger
